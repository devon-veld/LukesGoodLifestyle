# Netlify — Luke's Good Lifestyle (static design site)
# The build copies the static files into dist/. This matches BOTH possible
# Netlify configs (UI-saved "npm run build" + dist from the earlier Vite
# import, and this toml), so every deploy publishes the design.
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Single-page app: serve index.html for every route.
# (Functions declare their own /api/* paths and are matched before this.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
