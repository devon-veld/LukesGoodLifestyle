# Netlify — Luke's Good Lifestyle (static design site)
# The build copies the static files into dist/. This matches BOTH possible
# Netlify configs (UI-saved "npm run build" + dist from the earlier Vite
# import, and this toml), so every deploy publishes the design.
[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: serve index.html for every route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
